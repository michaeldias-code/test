<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de CartГЈo Profissional e Braille</title>
    <style>
        :root {
            --card-w: 430px;
            --card-h: 270px;
            --primary: #2563eb;
        }

        body { font-family: 'Inter', sans-serif; display: flex; margin: 0; background: #e5e7eb; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 380px; background: white; padding: 20px; overflow-y: auto; border-right: 1px solid #d1d5db; }
        .control-block { background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
        .control-block h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #374151; display: flex; justify-content: space-between; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size: 0.75rem; color: #6b7280; font-weight: bold; }
        input { width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; margin-top: 4px; box-sizing: border-box; }

        /* Preview */
        .preview { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .card-wrapper { perspective: 1000px; width: var(--card-w); height: var(--card-h); }
        .card { 
            width: 100%; height: 100%; position: relative; transition: transform 0.6s; 
            transform-style: preserve-3d; cursor: pointer; 
        }
        .card.flipped { transform: rotateY(180deg); }

        .face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 14px; background: #fff; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            overflow: hidden; border: 1px solid #ccc;
        }

        /* Elementos Fixos (ISO) */
        .iso-chip {
            position: absolute; width: 52px; height: 40px;
            background: linear-gradient(135deg, #e5c06d 0%, #b88a1a 100%);
            border-radius: 6px;
            left: 35px; top: 75px; /* PosiГ§ГЈo padrГЈo ISO */
            z-index: 5;
        }
        .iso-chip::after {
            content: ""; position: absolute; inset: 5px; border: 1px solid rgba(0,0,0,0.1); border-radius: 3px;
        }

        .back { transform: rotateY(180deg); }
        .mag-stripe { width: 100%; height: 48px; background: #1a1a1a; margin-top: 30px; }

        /* Elementos DinГўmicos */
        .dynamic-field {
            position: absolute; font-family: 'Courier New', monospace;
            white-space: nowrap; transition: all 0.2s;
        }
        .braille-mode { font-family: sans-serif !important; letter-spacing: 2px; font-size: 1.2rem !important; }

        .btn-flip { margin-top: 20px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>ConfiguraГ§Гµes</h2>
        
        <div class="control-block">
            <label>Cor de Fundo</label>
            <input type="color" id="bgColor" value="#ffffff" oninput="sync()">
        </div>

        <div id="fieldControls"></div>
    </aside>

    <main class="preview">
        <div class="card-wrapper">
            <div class="card" id="card" onclick="this.classList.toggle('flipped')">
                <div class="face front" id="cardFront">
                    <div class="iso-chip"></div>
                    </div>
                <div class="face back" id="cardBack">
                    <div class="mag-stripe"></div>
                </div>
            </div>
        </div>
        <button class="btn-flip" onclick="document.getElementById('card').classList.toggle('flipped')">Girar CartГЈo</button>
    </main>

<script>
    const fields = [
        { id: 'pan', label: 'NГєmero (PAN)', val: '4444 5555 6666 7777', x: 35, y: 140, size: 22, show: true, braille: false },
        { id: 'name', label: 'Nome', val: 'JOSГ‰ DA SILVA', x: 35, y: 210, size: 16, show: true, braille: false },
        { id: 'expiry', label: 'Validade', val: '12/30', x: 300, y: 210, size: 14, show: true, braille: false }
    ];

    const brailleMap = {
        '0': 'в јв љ', '1': 'в јв Ѓ', '2': 'в јв ќ', '3': 'в јв ‰', '4': 'в јв ™', '5': 'в јв ‘', '6': 'в јв ‹', '7': 'в јв ›', '8': 'в јв “', '9': 'в јв Љ',
        'a': 'в Ѓ', 'b': 'в ѓ', 'c': 'в ‰', 'd': 'в ™', 'e': 'в ‘', 'f': 'в ‹', 'g': 'в ›', 'h': 'в “', 'i': 'в Љ', 'j': 'в љ',
        'k': 'в …', 'l': 'в ‡', 'm': 'в Ќ', 'n': 'в ќ', 'o': 'в •', 'p': 'в Џ', 'q': 'в џ', 'r': 'в —', 's': 'в Ћ', 't': 'в ћ',
        'u': 'в Ґ', 'v': 'в §', 'w': 'в є', 'x': 'в ­', 'y': 'в Ѕ', 'z': 'в µ', ' ': ' ', '/': 'в ё'
    };

    function toBraille(text) {
        return text.toLowerCase().split('').map(char => brailleMap[char] || char).join('');
    }

    function renderControls() {
        const container = document.getElementById('fieldControls');
        container.innerHTML = fields.map((f, i) => `
            <div class="control-block">
                <h3>${f.label} <input type="checkbox" ${f.show ? 'checked' : ''} onchange="updateField(${i}, 'show', this.checked)"></h3>
                <input type="text" value="${f.val}" oninput="updateField(${i}, 'val', this.value)" placeholder="Texto">
                <div class="grid-inputs">
                    <div><label>X (px)</label><input type="number" value="${f.x}" oninput="updateField(${i}, 'x', this.value)"></div>
                    <div><label>Y (px)</label><input type="number" value="${f.y}" oninput="updateField(${i}, 'y', this.value)"></div>
                </div>
                <div style="margin-top:10px">
                    <label><input type="checkbox" ${f.braille ? 'checked' : ''} onchange="updateField(${i}, 'braille', this.checked)"> Modo Braille</label>
                </div>
            </div>
        `).join('');
    }

    function updateField(index, prop, value) {
        fields[index][prop] = value;
        sync();
    }

    function sync() {
        const front = document.getElementById('cardFront');
        const back = document.getElementById('cardBack');
        const color = document.getElementById('bgColor').value;
        
        front.style.backgroundColor = color;
        back.style.backgroundColor = color;

        // Remove campos antigos (mantendo o chip)
        const dynamics = front.querySelectorAll('.dynamic-field');
        dynamics.forEach(d => d.remove());

        // Adiciona campos atualizados
        fields.forEach(f => {
            if (!f.show) return;
            const el = document.createElement('div');
            el.className = `dynamic-field ${f.braille ? 'braille-mode' : ''}`;
            el.style.left = f.x + 'px';
            el.style.top = f.y + 'px';
            el.style.fontSize = f.size + 'px';
            el.innerText = f.braille ? toBraille(f.val) : f.val;
            front.appendChild(el);
        });
    }

    renderControls();
    sync();
</script>
</body>
</html>
