<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Designer Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=Roboto+Mono:wght@400;600&family=Montserrat:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=Fraunces:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --font-main: 'Inter', sans-serif;
            --page-w: 210mm;
            --page-h: 297mm;
            --page-pad: 40px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #1a1a2e;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 310px;
            flex-shrink: 0;
            background: #0f0f1a;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 20px 16px;
            overflow-y: auto;
            height: 100vh;
            color: #e2e8f0;
        }
        .sidebar h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.3rem;
            color: #fff;
            margin: 0 0 20px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar h2 span { font-size: 0.65rem; background: var(--primary); padding: 2px 6px; border-radius: 4px; font-family: 'Inter', sans-serif; font-weight: 600; vertical-align: middle; }

        .section-block {
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            overflow: hidden;
        }
        .section-block-header {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }
        .section-block-body { padding: 12px; }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: #94a3b8;
            margin: 8px 0 4px;
        }
        label:first-child { margin-top: 0; }

        select, input[type="file"] {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: #e2e8f0;
            font-size: 0.8rem;
            outline: none;
            transition: border 0.2s;
        }
        select:focus, input:focus { border-color: var(--primary); }
        select option { background: #1e1e2e; }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #cbd5e1;
            cursor: pointer;
            padding: 5px 0;
        }
        .checkbox-label input { width: auto; }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            margin-bottom: 8px;
        }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #94a3b8;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }

        /* ========== PREVIEW AREA ========== */
        .preview-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* ========== PAGE CONTAINER ========== */
        .page-wrap {
            width: var(--page-w);
            background: white;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            border-radius: 2px;
            overflow: hidden;
            /* CRITICAL: página A4 exata */
            page-break-after: always;
        }

        /* ========== BASE DO CV (todos os templates herdam) ========== */
        .cv-page {
            width: 100%;
            min-height: var(--page-h);
            max-height: var(--page-h);
            overflow: hidden;
            font-family: var(--font-main);
            color: #1e293b;
            font-size: 9.5pt;
            line-height: 1.45;
            position: relative;
        }

        /* Indicador de overflow */
        .page-overflow-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
            z-index: 1000;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

        /* ============================================================
           TEMPLATE: MODERN (1 coluna)
        ============================================================ */
        .tpl-modern {
            padding: var(--page-pad);
        }
        .tpl-modern .cv-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 2px solid var(--primary);
        }
        .tpl-modern .cv-header.flip { flex-direction: row-reverse; }
        .tpl-modern .header-text h1 {
            margin: 0 0 4px;
            font-size: 22pt;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .tpl-modern .section-title {
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-bottom: 1.5px solid var(--primary);
            padding-bottom: 4px;
            margin: 0 0 10px;
        }

        /* ============================================================
           TEMPLATE: EXECUTIVE (1 coluna, header colorido)
        ============================================================ */
        .tpl-executive .cv-header {
            background: var(--primary);
            color: white;
            padding: var(--page-pad) var(--page-pad) 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 0;
        }
        .tpl-executive .cv-header.flip { flex-direction: row-reverse; }
        .tpl-executive .cv-header h1 { margin: 0 0 4px; font-size: 22pt; font-weight: 700; color: white; }
        .tpl-executive .cv-body { padding: 24px var(--page-pad) var(--page-pad); }
        .tpl-executive .section-title {
            font-size: 8pt;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-left: 3px solid var(--primary);
            padding-left: 8px;
            margin: 0 0 10px;
        }

        /* ============================================================
           TEMPLATE: MINIMAL (1 coluna)
        ============================================================ */
        .tpl-minimal {
            padding: var(--page-pad);
        }
        .tpl-minimal .cv-header {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 20px;
        }
        .tpl-minimal .cv-header.flip { flex-direction: row-reverse; text-align: right; }
        .tpl-minimal .header-text h1 {
            margin: 0 0 3px;
            font-size: 26pt;
            font-weight: 300;
            letter-spacing: -1px;
        }
        .tpl-minimal .section-title {
            font-size: 7.5pt;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 4px;
            margin: 0 0 10px;
        }

        /* ============================================================
           TEMPLATE: CREATIVE (1 coluna, acento top)
        ============================================================ */
        .tpl-creative {
            padding: var(--page-pad);
            border-top: 12px solid var(--primary);
        }
        .tpl-creative .cv-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }
        .tpl-creative .cv-header.flip { flex-direction: row-reverse; }
        .tpl-creative .header-text h1 {
            margin: 0 0 4px;
            font-size: 22pt;
            font-weight: 700;
        }
        .tpl-creative .section-title {
            font-family: 'Roboto Mono', monospace;
            font-size: 7.5pt;
            font-weight: 600;
            background: var(--primary);
            color: white;
            display: inline-block;
            padding: 2px 10px;
            margin: 0 0 10px;
            letter-spacing: 0.5px;
        }

        /* ============================================================
           TEMPLATE: SIDEBAR-LEFT (2 colunas, barra lateral esquerda)
        ============================================================ */
        .tpl-sidebar-left {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: var(--page-h);
        }
        .tpl-sidebar-left .col-sidebar {
            background: var(--primary);
            color: white;
            padding: 30px 18px;
        }
        .tpl-sidebar-left .col-sidebar h1 {
            font-size: 15pt;
            font-weight: 700;
            margin: 0 0 4px;
            line-height: 1.2;
            color: white;
        }
        .tpl-sidebar-left .col-sidebar .section-title {
            font-size: 7pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 4px;
            margin: 16px 0 8px;
        }
        .tpl-sidebar-left .col-main {
            padding: 30px 28px;
        }
        .tpl-sidebar-left .col-main .section-title {
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-bottom: 1.5px solid var(--primary);
            padding-bottom: 3px;
            margin: 0 0 10px;
        }

        /* ============================================================
           TEMPLATE: SIDEBAR-RIGHT (2 colunas, barra lateral direita)
        ============================================================ */
        .tpl-sidebar-right {
            display: grid;
            grid-template-columns: 1fr 190px;
            min-height: var(--page-h);
        }
        .tpl-sidebar-right .col-main {
            padding: 30px 28px;
        }
        .tpl-sidebar-right .col-main .section-title {
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-bottom: 1.5px solid var(--primary);
            padding-bottom: 3px;
            margin: 0 0 10px;
        }
        .tpl-sidebar-right .col-sidebar {
            background: #f8fafc;
            border-left: 2px solid var(--primary);
            padding: 30px 16px;
        }
        .tpl-sidebar-right .col-sidebar .section-title {
            font-size: 7pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 4px;
            margin: 16px 0 8px;
        }
        .tpl-sidebar-right .col-sidebar .section-title:first-child { margin-top: 0; }

        /* ============================================================
           TEMPLATE: TWO-COL (2 colunas simétricas, header full-width)
        ============================================================ */
        .tpl-twocol .cv-header-full {
            background: var(--primary);
            color: white;
            padding: 28px var(--page-pad) 22px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .tpl-twocol .cv-header-full h1 {
            margin: 0 0 3px;
            font-size: 20pt;
            font-weight: 700;
            color: white;
        }
        .tpl-twocol .cv-body-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            padding: 0 var(--page-pad) var(--page-pad);
        }
        .tpl-twocol .col-left {
            padding: 20px 20px 0 0;
            border-right: 1px solid #e2e8f0;
        }
        .tpl-twocol .col-right {
            padding: 20px 0 0 20px;
        }
        .tpl-twocol .section-title {
            font-size: 7.5pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-bottom: 1.5px solid var(--primary);
            padding-bottom: 3px;
            margin: 0 0 10px;
        }

        /* ============================================================
           COMPONENTES PARTILHADOS
        ============================================================ */
        .photo-wrap {
            width: 90px; height: 90px;
            flex-shrink: 0;
            border-radius: 10px;
            overflow: hidden;
            border: 2.5px solid rgba(255,255,255,0.4);
        }
        .photo-wrap.dark-border { border-color: var(--primary); }
        .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .desired-pos {
            font-size: 10.5pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin: 3px 0 8px;
        }
        /* Sobre fundo colorido, forced white */
        .on-color .desired-pos { color: rgba(255,255,255,0.85) !important; }
        .on-color { color: white; }
        .on-color .contact-info { color: rgba(255,255,255,0.85); }

        .contact-info {
            font-size: 8pt;
            line-height: 1.7;
            color: #475569;
        }
        .contact-info a { color: inherit; text-decoration: none; }

        .cv-section {
            margin-bottom: 16px;
        }
        .cv-section:last-child { margin-bottom: 0; }

        .exp-item { margin-bottom: 12px; }
        .exp-item:last-child { margin-bottom: 0; }
        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
        }
        .exp-title { font-weight: 600; font-size: 9.5pt; }
        .exp-period { font-size: 8pt; color: #64748b; white-space: nowrap; }
        .exp-company { color: var(--primary); font-weight: 600; font-size: 8.5pt; margin: 1px 0 4px; }
        .exp-list {
            margin: 3px 0 0 0;
            padding-left: 14px;
            font-size: 8.5pt;
            color: #334155;
        }
        .exp-list li { margin-bottom: 2px; }

        .skill-tag {
            display: inline-block;
            background: rgba(0,0,0,0.06);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 8pt;
            margin: 2px 2px 2px 0;
        }
        .skill-tag.light {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .edu-item { margin-bottom: 8px; }
        .edu-degree { font-weight: 600; font-size: 9pt; }
        .edu-institution { font-size: 8pt; color: #64748b; }

        .cert-item { margin-bottom: 6px; font-size: 8.5pt; }
        .cert-item strong { display: block; }
        .cert-item span { color: #64748b; font-size: 8pt; }

        .vol-item { margin-bottom: 8px; font-size: 8.5pt; }
        .vol-item strong { display: block; font-size: 9pt; }
        .vol-item .vol-org { color: #64748b; font-size: 8pt; margin-bottom: 2px; }

        .proj-item { margin-bottom: 8px; font-size: 8.5pt; }
        .proj-item strong { display: block; font-size: 9pt; }

        .summary-text {
            font-size: 9pt;
            line-height: 1.55;
            text-align: justify;
            color: #334155;
        }

        /* ========== COVER LETTER PAGE ========== */
        .cover-page {
            width: var(--page-w);
            min-height: var(--page-h);
            background: white;
            padding: var(--page-pad);
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            font-family: var(--font-main);
            font-size: 10.5pt;
            line-height: 1.7;
            color: #1e293b;
        }
        .cover-section-title {
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            border-bottom: 1.5px solid var(--primary);
            padding-bottom: 4px;
            margin: 0 0 24px;
        }

        /* ========== PDF PRINT RULES ========== */
        @media print {
            body { background: white; }
            .sidebar, .preview-area > :not(.page-wrap):not(.cover-page) { display: none; }
        }

        @page { size: A4 portrait; margin: 0; }

        /* Scrollbar sidebar */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    </style>
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<div class="sidebar">
    <h2>CV Designer Pro <span>v2</span></h2>

    <div class="section-block">
        <div class="section-block-header">Arquivo</div>
        <div class="section-block-body">
            <label>Dados JSON:</label>
            <input type="file" id="json-file" accept=".json">
            <button class="btn btn-secondary" style="margin-top:8px" onclick="downloadModelJSON()">📄 Baixar Modelo JSON</button>
        </div>
    </div>

    <div class="section-block">
        <div class="section-block-header">Foto</div>
        <div class="section-block-body">
            <label>Imagem (opcional):</label>
            <input type="file" id="photo-upload" accept="image/*">
            <label>Posição:</label>
            <select id="photo-align">
                <option value="row">Esquerda</option>
                <option value="row-reverse">Direita</option>
            </select>
        </div>
    </div>

    <div class="section-block">
        <div class="section-block-header">Layout</div>
        <div class="section-block-body">
            <label>Template:</label>
            <select id="template-select">
                <optgroup label="1 Coluna">
                    <option value="modern">Moderno</option>
                    <option value="executive">Executivo</option>
                    <option value="minimal">Minimalista</option>
                    <option value="creative">Criativo</option>
                </optgroup>
                <optgroup label="2 Colunas (mais conteúdo)">
                    <option value="sidebar-left">Sidebar Esquerda</option>
                    <option value="sidebar-right">Sidebar Direita</option>
                    <option value="twocol">Duas Colunas Iguais</option>
                </optgroup>
            </select>

            <label>Cor primária:</label>
            <select id="color-palette">
                <option value="#2563eb">Azul Royal</option>
                <option value="#1e293b">Slate Dark</option>
                <option value="#7c3aed">Roxo Moderno</option>
                <option value="#059669">Verde Esmeralda</option>
                <option value="#dc2626">Vermelho</option>
                <option value="#0891b2">Ciano</option>
                <option value="#000000">Preto Puro</option>
            </select>

            <label>Fonte:</label>
            <select id="font-select">
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'DM Sans', sans-serif">DM Sans</option>
                <option value="'Montserrat', sans-serif">Montserrat</option>
                <option value="'Lora', serif">Lora</option>
            </select>
        </div>
    </div>

    <div class="section-block">
        <div class="section-block-header">Opções</div>
        <div class="section-block-body">
            <label class="checkbox-label"><input type="checkbox" id="include-cover" checked> Cover Letter</label>
            <label class="checkbox-label"><input type="checkbox" id="lang-toggle"> Inglês (EN)</label>
            <label class="checkbox-label"><input type="checkbox" id="show-photo" checked> Mostrar foto</label>
        </div>
    </div>

    <div id="overflow-alert" style="display:none; background:#ef444420; border:1px solid #ef4444; border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:0.75rem; color:#ef4444; line-height:1.4;">
        ⚠️ <strong>Conteúdo excede a página!</strong><br>Reduza a quantidade de itens ou use um template de 2 colunas.
    </div>

    <button class="btn btn-primary" onclick="exportPDF()">📥 Baixar PDF</button>
</div>

<!-- ========== PREVIEW ========== -->
<div class="preview-area" id="preview-area">
    <div style="color:#475569; text-align:center; padding: 60px 20px;">
        <div style="font-size:3rem; margin-bottom:12px">📄</div>
        <div style="color:#94a3b8; font-size:0.9rem;">Importe um arquivo JSON para começar</div>
    </div>
</div>

<script>
let cvData = null;
let userPhoto = null;

// =============================================
// EVENTOS
// =============================================
document.getElementById('photo-upload').onchange = e => {
    const r = new FileReader();
    r.onload = ev => { userPhoto = ev.target.result; render(); };
    r.readAsDataURL(e.target.files[0]);
};

document.getElementById('json-file').onchange = e => {
    const r = new FileReader();
    r.onload = ev => {
        try { cvData = JSON.parse(ev.target.result); render(); }
        catch(err) { alert('JSON inválido: ' + err.message); }
    };
    r.readAsText(e.target.files[0]);
};

['template-select','color-palette','font-select','include-cover','lang-toggle','photo-align','show-photo']
    .forEach(id => document.getElementById(id).onchange = render);

// =============================================
// HELPERS
// =============================================
const $ = id => document.getElementById(id);
const getLang = () => $('lang-toggle').checked ? 'en' : 'pt';
const pick = (obj, key) => {
    const lang = getLang();
    return obj[`${key}_${lang}`] || obj[key] || '';
};
const safe = v => v || '';

function setVars() {
    const color = $('color-palette').value;
    const font  = $('font-select').value;
    document.documentElement.style.setProperty('--primary', color);
    document.documentElement.style.setProperty('--font-main', font);
}

// =============================================
// CHECK OVERFLOW
// =============================================
function checkOverflow() {
    const pages = document.querySelectorAll('.cv-page');
    let overflow = false;
    pages.forEach(p => {
        if (p.scrollHeight > p.offsetHeight + 5) overflow = true;
    });
    $('overflow-alert').style.display = overflow ? 'block' : 'none';
}

// =============================================
// COMPONENTES REUTILIZÁVEIS
// =============================================
function photoHTML(dark = false) {
    const show = $('show-photo').checked;
    if (!userPhoto || !show) return '';
    return `<div class="photo-wrap ${dark ? '' : 'dark-border'}">
        <img src="${userPhoto}" alt="foto">
    </div>`;
}

function contactHTML(d, dark = false) {
    const colorCls = dark ? 'on-color' : '';
    return `
        <div class="desired-pos ${colorCls ? '' : ''}" style="${dark ? 'color:rgba(255,255,255,0.85)' : 'color:var(--primary)'}">
            ${safe(pick(d, 'desired_position'))}
        </div>
        <div class="contact-info ${colorCls}">
            📍 ${safe(d.location)} · 📞 ${safe(d.phone)}<br>
            ✉️ ${safe(d.email)}
            ${d.linkedin ? `<br>🔗 ${d.linkedin}` : ''}
            ${d.website  ? `<br>🌐 ${d.website}` : ''}
        </div>
    `;
}

function summarySection(d, titleClass = 'section-title') {
    const lang = getLang();
    const text = lang === 'pt' ? d.summary_pt : d.summary_en;
    if (!text) return '';
    const labels = { pt: 'Resumo', en: 'Summary' };
    return `<div class="cv-section">
        <div class="${titleClass}">${labels[lang]}</div>
        <p class="summary-text">${text}</p>
    </div>`;
}

function experienceSection(data, titleClass = 'section-title') {
    if (!data.experience?.length) return '';
    const lang = getLang();
    const labels = { pt: 'Experiência Profissional', en: 'Experience' };
    const items = data.experience.map(exp => `
        <div class="exp-item">
            <div class="exp-header">
                <span class="exp-title">${safe(pick(exp, 'position'))}</span>
                <span class="exp-period">${safe(exp.period)}</span>
            </div>
            <div class="exp-company">${safe(exp.company)}</div>
            <ul class="exp-list">
                ${(lang === 'pt' ? exp.description_pt : exp.description_en || []).map(i => `<li>${i}</li>`).join('')}
            </ul>
        </div>
    `).join('');
    return `<div class="cv-section">
        <div class="${titleClass}">${labels[lang]}</div>
        ${items}
    </div>`;
}

function educationSection(data, titleClass = 'section-title') {
    if (!data.education?.length) return '';

    const labels = { pt: 'Formação', en: 'Education' };
    const items = data.education.map(ed => `
        <div class="edu-item">

function skillsSection(data, titleClass = 'section-title', light = false) {
    if (!data.skills) return '';
    const lang = getLang();
    const labels = { pt: 'Habilidades', en: 'Skills' };
    const tagCls = light ? 'skill-tag light' : 'skill-tag';
    const techLabels = { pt: 'Técnicas', en: 'Technical' };
    const langLabels = { pt: 'Idiomas', en: 'Languages' };
    const softLabels = { pt: 'Soft Skills', en: 'Soft Skills' };
    let html = '';
    if (data.skills.technical?.length) {
        html += `<div style="margin-bottom:8px"><div style="font-size:7.5pt;font-weight:600;color:${light?'rgba(255,255,255,0.6)':'#64748b'};margin-bottom:3px;text-transform:uppercase;letter-spacing:0.8px">${techLabels[lang]}</div>
            ${data.skills.technical.map(s => `<span class="${tagCls}">${s}</span>`).join('')}</div>`;
    }
    if (data.skills.languages?.length) {
        html += `<div style="margin-bottom:8px"><div style="font-size:7.5pt;font-weight:600;color:${light?'rgba(255,255,255,0.6)':'#64748b'};margin-bottom:3px;text-transform:uppercase;letter-spacing:0.8px">${langLabels[lang]}</div>
            ${data.skills.languages.map(s => `<span class="${tagCls}">${s}</span>`).join('')}</div>`;
    }
    if (data.skills.soft?.length) {
        html += `<div><div style="font-size:7.5pt;font-weight:600;color:${light?'rgba(255,255,255,0.6)':'#64748b'};margin-bottom:3px;text-transform:uppercase;letter-spacing:0.8px">${softLabels[lang]}</div>
            ${data.skills.soft.map(s => `<span class="${tagCls}">${s}</span>`).join('')}</div>`;
    }
    return `<div class="cv-section">
        <div class="${titleClass}">${labels[lang]}</div>
        ${html}
    </div>`;
}

// =============================================
// RENDER PRINCIPAL
// =============================================
function render() {
    if (!cvData) return;
    setVars();

    const template = $('template-select').value;
    const lang = getLang();
    const d = cvData;
    const preview = $('preview-area');

    const renderers = {
        'modern': renderModern,
        'executive': renderExecutive,
        'minimal': renderMinimal,
        'creative': renderCreative,
        'sidebar-left': renderSidebarLeft,
        'sidebar-right': renderSidebarRight,
        'twocol': renderTwoCol,
    };

    let html = (renderers[template] || renderModern)(d);

    // Cover Letter
    if ($('include-cover').checked && d.coverletter) {
        const cl = lang === 'pt' ? d.coverletter.pt : d.coverletter.en;
        html += `
        <div class="cover-page" style="font-family:var(--font-main);margin-top:20px">
            <div class="cover-section-title" style="color:var(--primary);border-color:var(--primary)">Cover Letter</div>
            <p style="margin-top:0">Dear Hiring Manager,</p>
            <div style="white-space:pre-line">${safe(cl)}</div>
            <p style="margin-top:50px">Best regards,<br><strong>${safe(d.personal.fullname)}</strong></p>
        </div>`;
    }

    preview.innerHTML = html;

    // Checar overflow após render
    setTimeout(checkOverflow, 100);
}

// =============================================
// EXPORT PDF
// =============================================
async function exportPDF() {
    if (!cvData) { alert('Importe um JSON primeiro!'); return; }

    const pages = document.querySelectorAll('.page-wrap, .cover-page');
    if (!pages.length) return;

    // Cria container temporário com todas as páginas
    const container = document.createElement('div');
    pages.forEach((p, i) => {
        const clone = p.cloneNode(true);
        clone.style.pageBreakAfter = 'always';
        clone.style.pageBreakInside = 'avoid';
        container.appendChild(clone);
    });
    document.body.appendChild(container);
    container.style.position = 'fixed';
    container.style.left = '-9999px';
    container.style.top = '0';

    await html2pdf().set({
        margin: 0,
        filename: `CV_${cvData.personal?.fullname?.replace(/\s+/g,'_') || 'CV'}.pdf`,
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css'] }
    }).from(container).save();

    document.body.removeChild(container);
}
